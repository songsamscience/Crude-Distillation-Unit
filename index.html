<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>송쌤과학 - 원유의 분별 증류</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; font-family: 'Pretendard', sans-serif; }
body {
    --bg: #0d131f; --bg2: #141d2b; --bg3: #1c2838; --card: rgba(20, 30, 45, 0.9); 
    --tx: #e0e6ed; --tx2: #8a9fb8; --tx3: #4a6585; --acc: #ff8828; --acc2: #ff6810; 
    --bdr: rgba(100, 150, 255, 0.2); --bdr2: rgba(100, 150, 255, 0.05); --shd: rgba(0, 0, 0, 0.6); 
    --fi: #182333; background: var(--bg); color: var(--tx); transition: background .4s, color .4s;
}
body.light {
    --bg: #ebe7de; --bg2: #f2efe9; --bg3: #fcfbfa; --card: rgba(255, 255, 255, 0.95); 
    --tx: #222222; --tx2: #666666; --tx3: #888888; --acc: #e66000; --acc2: #cc5000; 
    --bdr: rgba(0, 0, 0, 0.15); --bdr2: rgba(0, 0, 0, 0.04); --shd: rgba(0, 0, 0, 0.1); 
    --fi: #e3dec9; background: var(--bg); color: var(--tx);
}
#app {
    position: relative; width: 100%; height: 100%; max-width: 1100px; max-height: 660px;
    aspect-ratio: 1100 / 660; background: transparent; overflow: hidden;
    box-shadow: 0 15px 60px var(--shd); border-radius: 12px;
}
@media (max-aspect-ratio: 1100/660) { #app { height: auto; } }
@media (min-aspect-ratio: 1100/660) { #app { width: auto; } }

:fullscreen #app, :-webkit-full-screen #app {
    width: 100vw !important; height: 100vh !important;
    max-width: 100vw !important; max-height: 100vh !important;
    aspect-ratio: auto !important;
    border-radius: 0; box-shadow: none;
}

canvas { display: block; width: 100%; height: 100%; }

#tempInp {
    position: absolute;
    left: 1.818%; top: 37.878%; width: 12.727%; height: 6.060%;
    background: var(--card);
    border: 2.5px solid #2070d0;
    border-radius: 8px;
    color: #2070d0;
    text-align: center;
    font-size: clamp(18px, 2.2vw, 26px);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    outline: none;
    z-index: 10;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
}
#tempInp::-webkit-outer-spin-button,
#tempInp::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#tempInp:focus { box-shadow: 0 0 10px rgba(32, 112, 208, 0.5); }

#linkBar {
    position: absolute; left: 20px; bottom: 12px;
    font-size: clamp(10px, 1.1vw, 13px);
    color: var(--tx3); z-index: 10; font-weight: 600; pointer-events: auto;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
}
#linkBar .lnk {
    color: var(--acc); text-decoration: none;
    transition: color 0.2s, text-decoration 0.2s;
    display: inline-flex; align-items: center; gap: 4px;
}
#linkBar .lnk:hover { color: var(--acc2); text-decoration: underline; }
#linkBar .yt { color: #ff4646; font-weight: 800; }
#linkBar .yt:hover { color: #ff0000; }
#linkBar .sep { color: var(--tx3); opacity: 0.4; }

.ov {
    position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); display: none; 
    justify-content: center; align-items: center; z-index: 99; backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
}
.ov.show { opacity: 1; pointer-events: auto; }
.dg {
    background: var(--card); border: 1px solid var(--bdr); padding: clamp(24px, 3vw, 40px); border-radius: 24px; 
    text-align: center; max-width: 520px; min-width: 300px; box-shadow: 0 25px 80px var(--shd);
    transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-height: 85vh; overflow-y: auto;
}
.ov.show .dg { transform: translateY(0); }
.dg h2 { font-size: clamp(18px, 2.5vw, 24px); font-weight: 800; margin-bottom: 20px; color: var(--acc); }
.dg p { white-space: pre-line; line-height: 1.7; color: var(--tx); font-size: clamp(13px, 1.4vw, 15px); font-weight: 500; margin-bottom: 28px; text-align: left; }
.dg button {
    padding: 14px 45px; background: var(--acc); color: #fff; border: none; border-radius: 12px; 
    font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.dg button:hover { background: var(--acc2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 104, 16, 0.4); }
.dg button:active { transform: translateY(1px); }
</style>
</head>
<body>
<div id="app">
    <canvas id="cv"></canvas>
    <input type="number" id="tempInp" min="0" max="450" value="0">
    <div id="linkBar">
        <span>📚 참고: <a class="lnk" href="https://sciencelove.com/483129" target="_blank">김정식 허명성의 과학사랑</a></span>
        <span class="sep">|</span>
        <a class="lnk yt" href="https://www.youtube.com/@songsamscience" target="_blank">▶ 송쌤과학 YouTube</a>
    </div>
    <div id="ov" class="ov">
        <div class="dg">
            <h2>🧪 원유의 분별 증류 가상실험</h2>
            <p id="mg"></p>
            <button onclick="clD()">실험 시작하기</button>
        </div>
    </div>
</div>
<script>
const cv = document.getElementById('cv'), X = cv.getContext('2d'), W = 1100, H = 660;
const tInp = document.getElementById('tempInp');
let dk = true, aT = 0;

/* ═══ 레이아웃 ═══ */
const FN = {x: 130, y: 340, w: 225, h: 225};
/* 증류탑을 아래로 이동(y:48→78)해 최상단에 버튼 공간 확보 + 높이 축소(505→475) */
const TW = {x: 550, y: 78, w: 210, h: 475};
const TRAY_GAP = 48;

/* ═══ 밸브 위치 (가열로 → 증류탑 파이프 중앙) ═══ */
const VALVE = { x: 455, y: 505, r: 22 };

/* ═══ UI 버튼 영역 (최상단 우측에 라이트모드 + 전체화면 배치) ═══ */
const BT = {
    thm: {x: 825, y: 15, w: 125, h: 32},  
    ful: {x: 958, y: 15, w: 122, h: 32},
    inj: {x: 20, y: 90, w: 140, h: 42},
    rst: {x: 170, y: 90, w: 140, h: 42},
    tp:  {x: 20, y: 140, w: 140, h: 36},
    rf:  {x: 170, y: 140, w: 140, h: 36},
    tup: {x: 20, y: 210, w: 140, h: 36},
    tdn: {x: 20, y: 295, w: 140, h: 36}
};

const F = [
  {nm:'석유 가스', s:'석유 가스', bp0:-42, bp1:20, col:'#dcb020', C:'C₁~C₄', tr:'~20℃', nfo:'끓는점 ~20℃', use:'가정·식당 LPG 연료\nLPG 자동차 연료', mol:'분자 매우 작음\n상온에서 기체 상태'},
  {nm:'휘발유', s:'휘발유', bp0:30, bp1:120, col:'#e04840', C:'C₅~C₉', tr:'30℃', nfo:'끓는점 30~120℃', use:'승용차 가솔린 연료\n경비행기 연료', mol:'탄소 5~9개\n휘발성 높음'},
  {nm:'나프타', s:'나프타', bp0:70, bp1:180, col:'#d07828', C:'C₅~C₁₂', tr:'110℃', nfo:'끓는점 70~180℃', use:'석유화학 원료\n플라스틱·합성섬유', mol:'탄소 5~12개\n화학공업 원료'},
  {nm:'등유', s:'등유', bp0:170, bp1:250, col:'#6050c0', C:'C₁₂~C₁₆', tr:'180℃', nfo:'끓는점 170~250℃', use:'제트기 연료\n보일러 난방', mol:'탄소 12~16개\n안정적 연소'},
  {nm:'경유', s:'경유', bp0:250, bp1:340, col:'#2070d0', C:'C₁₅~C₂₀', tr:'260℃', nfo:'끓는점 250~340℃', use:'디젤차·트럭·버스\n중장비 연료', mol:'탄소 15~20개\n점성 증가'},
  {nm:'윤활유', s:'윤활유', bp0:300, bp1:380, col:'#18a068', C:'C₂₀~C₃₀', tr:'340℃', nfo:'끓는점 300~380℃', use:'기계·엔진 윤활유\n그리스 원료', mol:'탄소 20~30개\n높은 점성'},
  {nm:'중유', s:'중유', bp0:340, bp1:420, col:'#c02010', C:'C₃₀~C₄₀', tr:'380℃', nfo:'끓는점 340~420℃', use:'대형 선박 연료\n발전소 보일러', mol:'탄소 30~40개\n매우 무거움'},
  {nm:'잔류물', s:'잔류물', bp0:450, bp1:900, col:'#604028', C:'C₄₀↑', tr:'', nfo:'미기화 잔류물', use:'아스팔트 포장재\n방수재·코팅재', mol:'탄소 40개 이상\n450℃에서도 기화 안됨'}
];
const LH = TW.h / F.length;
F.forEach((f, i) => { f.yt = TW.y + i * LH; f.yb = TW.y + (i + 1) * LH; f.dy = f.yt + LH / 2; f.bx = TW.x + TW.w + 115; f.by = f.dy - 16; });

let cT = 0, tT = 0, done = false, ejN = 0;
let isTUp = false, isTDn = false;
let pts = [], rfxUp = [], rfxDn = [];
let showTP = true, showRF = false;
let pDr = null, dFr = null, isDrF = false, dsx = 0, dsy = 0, mx = 0, my = 0, aLbl = null;
let truck = { x: -200, y: 540, st: 'idle', tk: 0, cnt: 0 }; 
let heatStarted = false;
let valveOpen = false;
let valveAngle = 0;

/* ═══ 고해상도 렌더링 (Retina/전체화면 대응) ═══ */
let renderScale = 1;
function setupCanvas(){
    const rect = cv.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    /* 실제 표시 픽셀 수에 맞춰 내부 해상도 스케일 결정 */
    const scaleX = rect.width / W, scaleY = rect.height / H;
    renderScale = Math.max(1, Math.min(scaleX, scaleY) * dpr);
    
    cv.width = Math.round(W * renderScale);
    cv.height = Math.round(H * renderScale);
    cv.style.width = '100%'; cv.style.height = '100%';
    X.setTransform(renderScale, 0, 0, renderScale, 0, 0);
    X.imageSmoothingEnabled = true; X.imageSmoothingQuality = 'high';
    
    bgCanvas.width = Math.round(W * renderScale);
    bgCanvas.height = Math.round(H * renderScale);
    bgX.setTransform(renderScale, 0, 0, renderScale, 0, 0);
    bgX.imageSmoothingEnabled = true; bgX.imageSmoothingQuality = 'high';
    
    bgCached = false;
}

const bgCanvas = document.createElement('canvas');
const bgX = bgCanvas.getContext('2d');
let bgCached = false;

function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function hit(p,r){return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h}
function hitCircle(p, cx, cy, r){ return Math.hypot(p.x-cx, p.y-cy) <= r; }
function cv2(v){return getComputedStyle(document.body).getPropertyValue(v).trim()}
function nr(m,s){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.max(m-s*3,Math.min(m+s*3,Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)*s+m))}

function drawTextBg(ctx, txt, x, y, bgCol, txtCol, font, pad = 6) {
    ctx.font = font;
    const w = ctx.measureText(txt).width;
    const match = font.match(/(\d+)px/);
    const h = match ? parseInt(match[1], 10) : 14;
    ctx.fillStyle = bgCol;
    rr(ctx, x - w/2 - pad, y - h + pad/2, w + pad*2, h + pad, 6);
    ctx.fill();
    ctx.fillStyle = txtCol;
    ctx.textAlign = 'center';
    ctx.fillText(txt, x, y);
}

const NP = 400;
class Pt {
  constructor(sx, sy, st='inj'){
    const i = Math.floor(Math.random() * F.length);
    this.f = F[i]; this.idx = i;
    const m = (this.f.bp0 + this.f.bp1) / 2, s = (this.f.bp1 - this.f.bp0) / 6;
    this.bp = nr(m, s); this.st = st; this.tk = 0;
    this.sz = 1.5 + (i * 0.5) + Math.random(); 

    if(st === 'inj'){ this.x = sx; this.y = sy; this.vx = 4.0 + Math.random() * 2.5; this.vy = (Math.random() - .5) * 1; }
    else { this.x = FN.x + 25 + Math.random() * (FN.w - 50); this.y = FN.y + 45 + Math.random() * (FN.h - 60); this.vx = (Math.random() - .5) * 2; this.vy = (Math.random() - .5) * 2; }
  }
  update(){
    this.tk++;
    const bx = FN.x + 12, by = FN.y + 34, bw = FN.w - 24, bh = FN.h - 46;
    switch(this.st){
    case 'inj':
      this.x += this.vx; this.y += this.vy;
      if(this.x > FN.x + 18 + Math.random() * 25){ this.st = 'fur'; this.vx = (Math.random() - .5) * 2; this.vy = (Math.random() - .5) * 2; this.tk = 0; }
      break;
    case 'fur':{
      let sp = 1 + cT / 100;
      this.x += this.vx * sp; this.y += this.vy * sp;
      if(this.x < bx){ this.x = bx; this.vx = Math.abs(this.vx); }
      if(this.x > bx + bw){ this.x = bx + bw; this.vx = -Math.abs(this.vx); }
      if(this.y < by){ this.y = by; this.vy = Math.abs(this.vy); }
      if(this.y > by + bh){ this.y = by + bh; this.vy = -Math.abs(this.vy); }
      
      /* ═══ 3가지 조건 모두 충족: 가열 + 밸브 열림 + 끓는점 도달 ═══ */
      if(heatStarted && valveOpen && (cT >= this.bp || (this.f.nm === '잔류물' && cT >= 350))){
        if(this.x > bx + bw - 40 && this.y > by + bh - 50){ this.st = 'ph'; this.tk = 0; }
      }
      break;
    }
    case 'ph':
      this.x += 4.5; this.y += (515 - this.y) * 0.15;
      /* 밸브가 닫히면 파이프 이동 중인 분자도 되돌아감 */
      if(!valveOpen) { this.st = 'fur'; break; }
      if(this.x >= TW.x + TRAY_GAP / 2){ this.st = 'rise'; }
      break;
    case 'rise':
      if(cT < this.bp || this.f.nm === '잔류물'){
        this.f = F[F.length - 1]; 
        this.y += 2.5; 
        if(this.y >= this.f.dy){ this.y = this.f.dy; this.st = 'settle'; this.tk = 0; }
      } else {
        this.y -= 3.5;
        if(this.y <= this.f.dy){ this.y = this.f.dy; this.st = 'settle'; this.tk = 0; }
      }
      this.x += (Math.random() - .5) * 1.5;
      this.x = Math.max(TW.x + 6, Math.min(TW.x + TRAY_GAP - 6, this.x));
      break;
    case 'settle':
      this.x += (Math.random() - .5) * 1.2; this.y += (this.f.dy - this.y) * .1;
      this.x = Math.max(TW.x + 6, Math.min(TW.x + TW.w / 2 + 15, this.x));
      if(this.tk > 22){ this.st = 'tray'; this.tk = 0; }
      break;
    case 'tray':
      this.x += 2.3; this.y += (this.f.dy - this.y) * .12;
      if(this.x > TW.x + TW.w - 5) this.st = 'out'; break;
    case 'out':
      this.x += 3; this.y += (Math.random() - .5) * .3;
      if(this.x >= TW.x + TW.w + 78) this.st = 'ej'; break;
    case 'ej':
      this.x += 4; if(this.x > W + 15){ this.st = 'dn'; ejN++; } break;
    }
  }
  draw(ctx){
    if(this.st === 'dn') return;
    const cl = this.f.col;
    if(this.st === 'enter' || this.st === 'settle' || this.st === 'rise'){ ctx.fillStyle = cl + '40'; ctx.beginPath(); ctx.arc(this.x, this.y, this.sz + 3, 0, Math.PI * 2); ctx.fill(); }
    ctx.fillStyle = cl; ctx.beginPath(); ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.beginPath(); ctx.arc(this.x - this.sz * .28, this.y - this.sz * .28, this.sz * .3, 0, Math.PI * 2); ctx.fill();
    if((this.st === 'settle' || this.st === 'rise') && (aT * 12 | 0) % 2){ ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = .6; ctx.beginPath(); ctx.arc(this.x, this.y, this.sz + 1.5, 0, Math.PI * 2); ctx.stroke(); }
  }
}

class RfxRise {
  constructor(){ this.x = TW.x + 15 + Math.random() * 25; this.y = TW.y + TW.h - 20; this.l = 80 + Math.random() * 60; this.ml = this.l; this.sp = .8 + Math.random() * .6; }
  update(){ this.y -= this.sp; this.x += (Math.random() - .5) * 1.2; this.x = Math.max(TW.x + 8, Math.min(TW.x + TRAY_GAP, this.x)); this.l--; }
  draw(ctx){ const a = (this.l / this.ml) * .5; ctx.fillStyle = `rgba(220,80,30,${a})`; ctx.beginPath(); ctx.arc(this.x, this.y, 1.8, 0, Math.PI * 2); ctx.fill(); }
}
class RfxFall {
  constructor(){ this.x = TW.x + TW.w - 15 - Math.random() * 40; this.y = TW.y + 20; this.l = 80 + Math.random() * 60; this.ml = this.l; this.sp = .6 + Math.random() * .4; }
  update(){ this.y += this.sp; this.x += (Math.random() - .5) * 1; this.x = Math.max(TW.x + TRAY_GAP + 10, Math.min(TW.x + TW.w - 6, this.x)); this.l--; }
  draw(ctx){ const a = (this.l / this.ml) * .4; ctx.fillStyle = `rgba(40,100,210,${a})`; ctx.beginPath(); ctx.arc(this.x, this.y, 1.6, 0, Math.PI * 2); ctx.fill(); }
}

function reset(){ 
    cT = 0; tT = 0; done = false; ejN = 0; pts = []; rfxUp = []; rfxDn = []; aLbl = null; 
    truck.st = 'idle'; truck.x = -200; tInp.value = 0;
    heatStarted = false; valveOpen = false; valveAngle = 0;
}
function callTruck(){ 
    if(truck.st === 'idle' || truck.st === 'out') { 
        truck.st = 'in'; truck.x = -200; truck.tk = 0; truck.cnt = 0; 
        ejN = 0; done = false;
    } 
}
function updateTruck() {
    if(truck.st === 'in') {
        truck.x += 5.5;
        if(truck.x >= FN.x - 120) { truck.x = FN.x - 120; truck.st = 'pour'; truck.tk = 0; }
    } else if(truck.st === 'pour') {
        truck.tk++;
        if(truck.tk % 1 === 0 && truck.cnt < NP) {
            pts.push(new Pt(FN.x - 45, truck.y - 12, 'inj'));
            pts.push(new Pt(FN.x - 45, truck.y - 10, 'inj'));
            pts.push(new Pt(FN.x - 45, truck.y - 14, 'inj'));
            truck.cnt += 3;
            while(pts.length > 1200) pts.shift();
        }
        if(truck.tk > 160) { truck.st = 'out'; }
    } else if(truck.st === 'out') {
        truck.x -= 4.5;
        if(truck.x < -200) truck.st = 'idle';
    }
}

function intro(){ showD(
  "1. '🛢️ 원유 주입'으로 유조차를 불러 원유를 넣으세요.\n\n"+
  "2. 온도를 직접 타이핑하거나 [▲/▼] 버튼을 눌러 가열하세요.\n\n"+
  "3. 🔒 파이프 중간의 밸브를 클릭하여 여세요!\n   ※ 밸브를 열어야 기화된 분자가 증류탑으로 이동합니다.\n\n"+
  "4. 끓는점에 도달한 성분이 기화되어 파이프를 통해 증류탑 위로 분리됩니다.\n\n"+
  "5. 무거운 성분(잔류물)은 기화되지 않고 아래쪽으로 분리됩니다.\n\n"+
  "6. 이름표를 드래그하여 각 층의 물리적 상태(기체/액체)를 관찰하세요.\n\n"+
  "7. '🔄 환류 표시'로 순도를 높이는 기액 접촉 원리를 확인하세요.",
  ()=>{}
);}

function init(){
    reset();
    setupCanvas();
    
    window.addEventListener('resize', () => { setupCanvas(); });
    document.addEventListener('fullscreenchange', () => { setTimeout(setupCanvas, 100); });
    document.addEventListener('webkitfullscreenchange', () => { setTimeout(setupCanvas, 100); });
    
    cv.addEventListener('mousedown', oD); cv.addEventListener('mousemove', oM); window.addEventListener('mouseup', oU);
    cv.addEventListener('touchstart', oD, {passive:false}); cv.addEventListener('touchmove', oM, {passive:false}); window.addEventListener('touchend', oU);
    
    tInp.addEventListener('input', (e) => {
        let val = parseInt(e.target.value) || 0;
        if(val > 450) val = 450;
        if(val < 0) val = 0;
        tT = val;
        if(tT > 0) heatStarted = true;
    });

    loop(); intro();
}
function gp(e){const r=cv.getBoundingClientRect();let x=e.clientX,y=e.clientY;if(e.touches&&e.touches.length){x=e.touches[0].clientX;y=e.touches[0].clientY;e.preventDefault()}return{x:(x-r.left)*(W/r.width),y:(y-r.top)*(H/r.height)}}
function oD(e){
  const p = gp(e);
  if(hit(p, BT.thm)){ dk = !dk; document.body.classList.toggle('light', !dk); bgCached = false; return; }
  if(hit(p, BT.ful)){ tFS(); return; }
  if(hit(p, BT.rst)){ reset(); intro(); return; }
  if(hit(p, BT.inj)){ callTruck(); return; } 
  if(hit(p, BT.tp)){ showTP = !showTP; return; }
  if(hit(p, BT.rf)){ showRF = !showRF; return; }
  if(hit(p, BT.tup)){ isTUp = true; heatStarted = true; return; } 
  if(hit(p, BT.tdn)){ isTDn = true; return; }
  
  /* 밸브 클릭 (히트영역은 실제 원보다 조금 크게) */
  if(hitCircle(p, VALVE.x, VALVE.y, VALVE.r + 6)){ 
      valveOpen = !valveOpen; 
      return; 
  }
  
  for(let f of F){ if(p.x >= f.bx && p.x <= f.bx + 88 && p.y >= f.by && p.y <= f.by + 30){ pDr = f; dsx = p.x; dsy = p.y; return; } }
}
function oM(e){
  const p = gp(e); 
  if(pDr && Math.hypot(p.x - dsx, p.y - dsy) > 5){ isDrF = true; dFr = pDr; pDr = null; }
  if(isDrF){ mx = p.x; my = p.y; return; }
}
function oU(){
  isTUp = false; isTDn = false; 
  if(pDr){ showD(`[ ${pDr.nm} ]  ${pDr.C}\n끓는점: ${pDr.nfo}\n\n📌 용도\n${pDr.use}\n\n🔬 특징\n${pDr.mol}`); pDr = null; }
  if(isDrF){ const ins = mx >= TW.x - 12 && mx <= TW.x + TW.w + 12 && my >= TW.y && my <= TW.y + TW.h; if(ins) aLbl = {f: dFr, x: mx, y: my, st: 'f'}; isDrF = false; dFr = null; }
}

function loop(){
  aT += .016;
  
  if(isTUp) { tT = Math.min(450, tT + 2.5); heatStarted = true; }
  if(isTDn) tT = Math.max(0, tT - 2.5);
  
  if(cT < tT) { cT = Math.min(cT + 2, tT); if(cT > 0) heatStarted = true; } 
  else if(cT > tT) cT = Math.max(cT - 2, tT);
  
  /* 밸브 핸들 회전 애니메이션 (열림=90°, 닫힘=0°) */
  const targetAngle = valveOpen ? Math.PI / 2 : 0;
  valveAngle += (targetAngle - valveAngle) * 0.15;
  
  if(document.activeElement !== tInp) tInp.value = Math.floor(tT);

  updateTruck();

  let ac = 0; pts.forEach(p => { p.update(); if(p.st !== 'dn') ac++; });
  pts = pts.filter(p => p.st !== 'dn');
  done = (ac === 0 && ejN > 0 && truck.st === 'idle');

  if(showRF && cT > 100){
    if(Math.random() < .08) rfxUp.push(new RfxRise());
    if(Math.random() < .06) rfxDn.push(new RfxFall());
    rfxUp.forEach(r => r.update()); rfxDn.forEach(r => r.update());
    rfxUp = rfxUp.filter(r => r.l > 0); rfxDn = rfxDn.filter(r => r.l > 0);
  }

  if(aLbl){ if(aLbl.st === 'f'){ const d = aLbl.f.dy - aLbl.y; if(Math.abs(d) < 4){ aLbl.y = aLbl.f.dy; aLbl.st = 'r'; }else aLbl.y += Math.sign(d) * 5; } else if(aLbl.st === 'r'){ const tx = aLbl.f.bx + 44, ty = aLbl.f.dy, dx2 = tx - aLbl.x, dy2 = ty - aLbl.y; if(Math.abs(dx2) < 4 && Math.abs(dy2) < 4) aLbl = null; else { aLbl.x += dx2 * .15; aLbl.y += dy2 * .15; } } }
  
  render(); requestAnimationFrame(loop);
}

function drawPipeSegH(ctx, x, y, w, pw, iw){
  const g = ctx.createLinearGradient(0, y, 0, y+pw);
  g.addColorStop(0, dk ? '#3a4a5a' : '#98a8b8'); g.addColorStop(.5, dk ? '#5a6a7a' : '#b8c8d8'); g.addColorStop(1, dk ? '#3a4a5a' : '#98a8b8');
  ctx.fillStyle = g; ctx.fillRect(x, y, w, pw);
  ctx.fillStyle = dk ? '#2a3a4a' : '#b8c0c8'; ctx.fillRect(x+2, y+(pw-iw)/2, w-4, iw);
}

/* ═══ 밸브 렌더링 (실물 게이트밸브 스타일) ═══ */
function drawValve(ctx) {
    const cx = VALVE.x, cy = VALVE.y, r = VALVE.r;
    
    ctx.save();
    
    /* 1. 플랜지 본체 그림자 */
    ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
    
    /* 2. 외곽 원형 하우징 (금속 그라디언트) */
    const vg = ctx.createRadialGradient(cx - 4, cy - 6, 2, cx, cy, r);
    if(dk){
        vg.addColorStop(0, '#7a8594'); vg.addColorStop(0.4, '#5a6474'); 
        vg.addColorStop(0.8, '#3a4454'); vg.addColorStop(1, '#2a3444');
    } else {
        vg.addColorStop(0, '#e8edf2'); vg.addColorStop(0.4, '#b8c0cc'); 
        vg.addColorStop(0.8, '#88909c'); vg.addColorStop(1, '#68707c');
    }
    ctx.fillStyle = vg;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    
    /* 3. 외곽 링 */
    ctx.strokeStyle = dk ? '#1a222e' : '#555c66'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    
    /* 4. 6개 플랜지 볼트 */
    for(let i = 0; i < 6; i++){
        const a = (i / 6) * Math.PI * 2 + Math.PI/6;
        const bx = cx + Math.cos(a) * (r - 5);
        const by = cy + Math.sin(a) * (r - 5);
        ctx.fillStyle = dk ? '#1a2230' : '#444a55';
        ctx.beginPath(); ctx.arc(bx, by, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = dk ? '#4a5464' : '#888f9a';
        ctx.beginPath(); ctx.arc(bx - 0.5, by - 0.5, 0.8, 0, Math.PI * 2); ctx.fill();
    }
    
    /* 5. 중앙 디스크 (상태에 따라 빨강/초록) */
    const diskG = ctx.createRadialGradient(cx - 2, cy - 3, 1, cx, cy, r - 8);
    if(valveOpen){
        diskG.addColorStop(0, '#5affa0'); diskG.addColorStop(0.5, '#1faa70'); 
        diskG.addColorStop(0.85, '#0f8550'); diskG.addColorStop(1, '#085030');
    } else {
        diskG.addColorStop(0, '#ff7a7a'); diskG.addColorStop(0.5, '#d02828'); 
        diskG.addColorStop(0.85, '#a01818'); diskG.addColorStop(1, '#601010');
    }
    ctx.fillStyle = diskG;
    ctx.beginPath(); ctx.arc(cx, cy, r - 8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, r - 8, 0, Math.PI * 2); ctx.stroke();
    
    /* 6. 밸브 핸들 (T자형 레버) - 회전 애니메이션 */
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(valveAngle);
    
    /* 핸들 막대 (그림자) */
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
    const handleG = ctx.createLinearGradient(0, -3, 0, 3);
    handleG.addColorStop(0, dk ? '#5a6474' : '#a8b0bc');
    handleG.addColorStop(0.5, dk ? '#2a3444' : '#68707c');
    handleG.addColorStop(1, dk ? '#1a2230' : '#444a55');
    ctx.fillStyle = handleG;
    rr(ctx, -r + 3, -3, (r - 3) * 2, 6, 3); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    
    /* 핸들 양 끝 노브 (오렌지색 포인트) */
    const knobG1 = ctx.createRadialGradient(-r + 4, -1, 0.5, -r + 5, 0, 4);
    knobG1.addColorStop(0, '#ffcc88'); knobG1.addColorStop(0.5, '#ff8828'); knobG1.addColorStop(1, '#cc5000');
    ctx.fillStyle = knobG1;
    ctx.beginPath(); ctx.arc(-r + 5, 0, 4, 0, Math.PI * 2); ctx.fill();
    
    const knobG2 = ctx.createRadialGradient(r - 6, -1, 0.5, r - 5, 0, 4);
    knobG2.addColorStop(0, '#ffcc88'); knobG2.addColorStop(0.5, '#ff8828'); knobG2.addColorStop(1, '#cc5000');
    ctx.fillStyle = knobG2;
    ctx.beginPath(); ctx.arc(r - 5, 0, 4, 0, Math.PI * 2); ctx.fill();
    
    /* 중앙 너트 (육각형 형태로) */
    ctx.fillStyle = dk ? '#1a2230' : '#444a55';
    ctx.beginPath();
    for(let i = 0; i < 6; i++){
        const a = (i / 6) * Math.PI * 2;
        const px = Math.cos(a) * 4.5, py = Math.sin(a) * 4.5;
        if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = dk ? '#0a0f16' : '#2a303a'; ctx.lineWidth = 0.8; ctx.stroke();
    
    /* 너트 중앙 하이라이트 */
    ctx.fillStyle = dk ? '#3a4454' : '#888f9a';
    ctx.beginPath(); ctx.arc(-1, -1, 1.2, 0, Math.PI * 2); ctx.fill();
    
    ctx.restore();
    
    /* 7. 상태 라벨 (OPEN/CLOSE) - 밸브 아래쪽 */
    ctx.font = "900 11px 'IBM Plex Mono'";
    ctx.textAlign = 'center';
    const labelY = cy + r + 18;
    const labelTxt = valveOpen ? '● OPEN' : '● CLOSE';
    const labelW = ctx.measureText(labelTxt).width + 16;
    
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
    ctx.fillStyle = valveOpen ? 'rgba(24, 160, 104, 0.98)' : 'rgba(192, 32, 32, 0.98)';
    rr(ctx, cx - labelW/2, labelY - 11, labelW, 18, 9); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    rr(ctx, cx - labelW/2, labelY - 11, labelW, 18, 9); ctx.stroke();
    
    ctx.fillStyle = '#fff';
    ctx.fillText(labelTxt, cx, labelY + 2);
    
    /* 8. 깜빡이는 힌트 (가열 중인데 밸브가 닫혀있으면) */
    if(heatStarted && !valveOpen && pts.some(p => p.st === 'fur')){
        const pulse = Math.sin(aT * 4) * 0.4 + 0.6;
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(cx, cy, r + 6 + Math.sin(aT * 4) * 3, 0, Math.PI * 2); ctx.stroke();
        
        ctx.font = "800 11px Pretendard";
        const tipTxt = "👆 밸브를 클릭해 여세요";
        const tipW = ctx.measureText(tipTxt).width + 16;
        ctx.fillStyle = dk ? 'rgba(69,52,10,0.95)' : 'rgba(255,244,210,0.95)';
        rr(ctx, cx - tipW/2, cy - r - 30, tipW, 22, 11); ctx.fill();
        ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1.5;
        rr(ctx, cx - tipW/2, cy - r - 30, tipW, 22, 11); ctx.stroke();
        ctx.fillStyle = dk ? '#ffcc66' : '#aa6600';
        ctx.fillText(tipTxt, cx, cy - r - 15);
        ctx.restore();
    }
    
    ctx.restore();
}

function drawTruck(ctx) {
    if(truck.st === 'idle') return;
    const tx = truck.x, ty = truck.y;
    
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(tx + 25, ty, 12, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tx + 90, ty, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ccc';
    ctx.beginPath(); ctx.arc(tx + 25, ty, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(tx + 90, ty, 4, 0, Math.PI * 2); ctx.fill();
    
    ctx.fillStyle = dk ? '#cfd8dc' : '#eceff1';
    rr(ctx, tx + 75, ty - 38, 35, 30, 4); ctx.fill();
    ctx.fillStyle = '#81d4fa'; 
    ctx.fillRect(tx + 88, ty - 33, 18, 14);
    
    const tg = ctx.createLinearGradient(0, ty - 45, 0, ty - 10);
    tg.addColorStop(0, '#ff9800'); tg.addColorStop(1, '#e65100');
    ctx.fillStyle = tg;
    rr(ctx, tx, ty - 45, 82, 36, 12); ctx.fill();
    
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(tx + 10, ty - 40, 60, 6);
    
    ctx.fillStyle = '#fff'; ctx.font = '900 14px Pretendard'; ctx.textAlign = 'center';
    ctx.fillText('CRUDE', tx + 40, ty - 22);
    
    if(truck.st === 'pour') {
        ctx.strokeStyle = '#333'; ctx.lineWidth = 6; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(tx + 105, ty - 12); ctx.lineTo(FN.x - 55, ty - 12); ctx.stroke();
    }
}

function drawFurnaceDynamic(ctx){
  const x = FN.x, y = FN.y, w = FN.w, h = FN.h;
  if(cT > 15){
    const it = Math.min(1, cT / 350);
    const g = ctx.createLinearGradient(0, y+h-12, 0, y+32);
    g.addColorStop(0, `rgba(230,50,10,${it*.7})`); g.addColorStop(.25, `rgba(245,140,20,${it*.4})`);
    g.addColorStop(.55, `rgba(255,200,30,${it*.15})`); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; rr(ctx, x+14, y+32, w-28, h-44, 8); ctx.fill();
  }
  let fI = cT <= 0 ? 0 : Math.min(1, cT / 370); if(done) fI = 0;
  if(fI > 0){
    const bY = y+h+20, mH = 65 * fI;
    const gg = ctx.createRadialGradient(x+w/2, bY, 3, x+w/2, bY-5, 45+fI*30);
    gg.addColorStop(0, `rgba(255,100,10,${fI*.35})`); gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg; ctx.fillRect(x-12, bY-mH-10, w+24, mH+20);
    
    for(let i = 0; i < 11; i++){
      const fx = x+10+(w-20)*(i/10), t = aT*3+i*1.8;
      const fl = .45+Math.sin(t)*.25+Math.sin(t*2.3)*.15+Math.random()*.08;
      const fh = mH*fl, fw = 7+Math.sin(t*1.2)*1.5;
      const g1 = ctx.createLinearGradient(fx, bY, fx, bY-fh);
      g1.addColorStop(0, `rgba(220,50,5,${.85*fI})`); g1.addColorStop(.3, `rgba(245,120,10,${.6*fI})`);
      g1.addColorStop(.6, `rgba(255,180,20,${.3*fI})`); g1.addColorStop(1, 'transparent');
      ctx.fillStyle = g1; ctx.beginPath(); ctx.moveTo(fx-fw, bY);
      ctx.quadraticCurveTo(fx-fw*.5, bY-fh*.6, fx+Math.sin(t*2)*1.2, bY-fh);
      ctx.quadraticCurveTo(fx+fw*.5, bY-fh*.6, fx+fw, bY); ctx.fill();
      
      if(fI > .35){
        const ih = fh*.45, iw = fw*.4; const g2 = ctx.createLinearGradient(fx, bY, fx, bY-ih);
        g2.addColorStop(0, `rgba(255,220,70,${.6*fI})`); g2.addColorStop(.5, `rgba(255,240,140,${.25*fI})`); g2.addColorStop(1, 'transparent');
        ctx.fillStyle = g2; ctx.beginPath(); ctx.moveTo(fx-iw, bY); ctx.quadraticCurveTo(fx, bY-ih, fx+iw, bY); ctx.fill();
      }
    }
  }
}

function drawTowerDynamic(ctx){
  if(showTP){
    const bx = TW.x - 75, bw = 14;
    const bg = ctx.createLinearGradient(0, TW.y, 0, TW.y + TW.h);
    bg.addColorStop(0, '#3aa0ff'); bg.addColorStop(.25, '#38a050'); bg.addColorStop(.6, '#d09010'); bg.addColorStop(1, '#ff4020');
    ctx.fillStyle = bg; rr(ctx, bx, TW.y, bw, TW.h, 7); ctx.fill();
    ctx.strokeStyle = dk ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1.5; rr(ctx, bx, TW.y, bw, TW.h, 7); ctx.stroke();
    
    ctx.font = "800 14px Pretendard";
    const topTxt = "❄️ 낮은 온도";
    const topW = ctx.measureText(topTxt).width + 24;
    ctx.fillStyle = dk ? 'rgba(26,43,69,0.95)' : 'rgba(234,244,255,0.95)';
    rr(ctx, bx + bw/2 - topW/2, TW.y - 38, topW, 30, 15); ctx.fill();
    ctx.strokeStyle = '#3aa0ff'; ctx.lineWidth = 2;
    rr(ctx, bx + bw/2 - topW/2, TW.y - 38, topW, 30, 15); ctx.stroke();
    ctx.fillStyle = dk ? '#77bdff' : '#0055b3';
    ctx.textAlign = 'center'; ctx.fillText(topTxt, bx + bw/2, TW.y - 18);
    
    const botTxt = "🔥 높은 온도";
    const botW = ctx.measureText(botTxt).width + 24;
    ctx.fillStyle = dk ? 'rgba(69,26,26,0.95)' : 'rgba(255,234,234,0.95)';
    rr(ctx, bx + bw/2 - botW/2, TW.y + TW.h + 8, botW, 30, 15); ctx.fill();
    ctx.strokeStyle = '#ff4020'; ctx.lineWidth = 2;
    rr(ctx, bx + bw/2 - botW/2, TW.y + TW.h + 8, botW, 30, 15); ctx.stroke();
    ctx.fillStyle = dk ? '#ff7766' : '#cc1100';
    ctx.fillText(botTxt, bx + bw/2, TW.y + TW.h + 28);
  }
  if(showRF && cT > 100){
    const s1 = Math.sin(aT * 3) * 5;
    const bCol = dk ? 'rgba(10,15,25,0.85)' : 'rgba(255,255,255,0.9)';
    
    drawTextBg(ctx, '↑ 증기 상승', TW.x + 28, TW.y + TW.h*.3 + s1, bCol, '#ff6633', "bold 12px Pretendard", 8);
    drawTextBg(ctx, '↓ 액체 하강', TW.x + TW.w - 28, TW.y + TW.h*.5 - s1, bCol, '#3388ff', "bold 12px Pretendard", 8);
    drawTextBg(ctx, '환류: 응축액을 되돌려 기액 접촉 → 순도 향상', TW.x + TW.w/2, TW.y - 18, bCol, cv2('--tx'), "700 11px Pretendard", 10);
    
    F.forEach((f, i) => {
      if(i >= F.length - 1) return; const ty = f.yb; const pulse = Math.sin(aT * 4 + i) * .5 + .5;
      ctx.fillStyle = `rgba(255,200,50,${pulse * .15})`; ctx.beginPath(); ctx.arc(TW.x + TRAY_GAP + 30, ty, 10, 0, Math.PI * 2); ctx.fill();
    });
  }
}

function drawUI(){
  X.fillStyle = cv2('--acc'); X.font = "900 26px 'Black Han Sans', Pretendard"; X.textAlign = 'left'; X.fillText('원유의 분별 증류', 20, 36);
  X.fillStyle = cv2('--tx3'); X.font = "600 13px Pretendard"; X.fillText('끓는점 차이를 이용한 혼합물의 분리', 20, 58);
  
  drawBtn(X, BT.inj, '#105080', '🛢️ 원유 주입');
  drawBtn(X, BT.rst, done ? '#c02505' : '#885020', done ? '🔄 다시하기' : '↺ 초기화');
  drawToggle(X, BT.tp, '🌡️ 온도분포 표시', showTP);
  drawToggle(X, BT.rf, '🔄 환류 원리 표시', showRF);
  drawBtn(X, BT.thm, dk ? '#354560' : '#8a95a5', dk ? '☀️ 라이트 모드' : '🌙 다크 모드', 12);
  drawBtn(X, BT.ful, dk ? '#354560' : '#8a95a5', '⛶ 전체 화면', 12);
  
  const rT = BT.tup, rD = BT.tdn;
  X.fillStyle = isTUp ? cv2('--acc2') : cv2('--acc'); rr(X, rT.x, rT.y, rT.w, rT.h, 8); X.fill();
  X.fillStyle = '#fff'; X.font = "800 15px Pretendard"; X.textAlign = 'center'; X.fillText("▲ 온도 올리기", rT.x + rT.w/2, rT.y + 23);

  X.fillStyle = isTDn ? cv2('--tx3') : (dk ? '#3a4a5a' : '#98a8b8'); rr(X, rD.x, rD.y, rD.w, rD.h, 8); X.fill();
  X.fillStyle = '#fff'; X.font = "800 15px Pretendard"; X.fillText("▼ 온도 내리기", rD.x + rD.w/2, rD.y + 23);

  const cr = cT / 450;
  const tCol = cr > 0.6 ? '#e03010' : '#2070d0';
  tInp.style.borderColor = tCol;
  tInp.style.color = tCol;
  
  X.fillStyle = cv2('--tx2'); X.font = "700 13px Pretendard"; 
  X.fillText('가열로 목표 온도', rT.x + rT.w/2, rT.y - 12);
  
  if(!heatStarted && pts.length > 0 && pts.some(p => p.st === 'fur')) {
      const pulse = Math.sin(aT * 3) * 0.3 + 0.7;
      X.save();
      X.globalAlpha = pulse;
      X.font = "800 14px Pretendard";
      X.textAlign = 'center';
      const msg = "⬆ 온도를 올려야 원유가 기화됩니다! ⬆";
      const msgW = X.measureText(msg).width + 20;
      const msgX = FN.x + FN.w / 2;
      const msgY = FN.y - 14;
      X.fillStyle = dk ? 'rgba(69,26,26,0.95)' : 'rgba(255,234,234,0.95)';
      rr(X, msgX - msgW/2, msgY - 18, msgW, 24, 12); X.fill();
      X.strokeStyle = '#ff4020'; X.lineWidth = 2;
      rr(X, msgX - msgW/2, msgY - 18, msgW, 24, 12); X.stroke();
      X.fillStyle = dk ? '#ff9988' : '#cc1100';
      X.fillText(msg, msgX, msgY - 2);
      X.restore();
  }
  
  X.fillStyle = cv2('--tx3'); X.font = "700 12px Pretendard"; X.textAlign = 'right'; X.fillText('ⓒ 송쌤과학', W-20, H-40);
  X.font = "500 10px 'IBM Plex Mono'"; X.fillText('가상실험실 | 중2 과학', W-20, H-24);
  X.fillStyle = cv2('--tx3'); X.font = "600 12px Pretendard"; X.textAlign = 'center';
  X.fillText('원유를 가열 → 밸브를 열면 → 증류탑을 올라가며 끓는점이 높은 순으로 액화 분리됩니다.', W/2, H-48);
}

function drawBtn(ctx, r, c, t, fSize = 14){
  ctx.fillStyle = c; rr(ctx, r.x, r.y, r.w, r.h, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = `800 ${fSize}px Pretendard`; ctx.textAlign = 'center'; ctx.fillText(t, r.x + r.w/2, r.y + r.h/2 + 5);
}
function drawToggle(ctx, r, t, on){
  ctx.fillStyle = on ? 'rgba(25,130,70,.85)' : 'rgba(100,110,120,.35)'; rr(ctx, r.x, r.y, r.w, r.h, 6); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = "700 12px Pretendard"; ctx.textAlign = 'center'; ctx.fillText(t, r.x + r.w/2, r.y + r.h/2 + 4);
}

function render(){
  if(!bgCached){ drawStaticCache(); bgCached = true; }
  X.clearRect(0, 0, W, H);
  /* 배경 캐시를 실제 렌더 좌표계(1100x660)에 맞춰 그림 */
  X.drawImage(bgCanvas, 0, 0, bgCanvas.width, bgCanvas.height, 0, 0, W, H);
  
  drawFurnaceDynamic(X);
  drawTruck(X);
  pts.forEach(p => p.draw(X));
  if(showRF){ rfxUp.forEach(r => r.draw(X)); rfxDn.forEach(r => r.draw(X)); }
  drawTowerDynamic(X);
  drawValve(X);
  drawUI();
  drawDragItem();
}

function drawDragItem(){
  let fr = null, cx = 0, cy = 0;
  if(isDrF && dFr){ fr = dFr; cx = mx; cy = my; } else if(aLbl){ fr = aLbl.f; cx = aLbl.x; cy = aLbl.y; } else return;
  const ins = cx >= TW.x - 12 && cx <= TW.x + TW.w + 12 && cy >= TW.y && cy <= TW.y + TW.h;
  let st = '', sc = '', isG = false;
  if(ins){
    const pr = Math.max(0, (cy - TW.y) / TW.h); const tA = Math.round(420 * pr + 20 * (1 - pr)); const ab = (fr.bp0 + fr.bp1) / 2;
    if(fr.s === '잔류물'){ st = '미기화 잔류물'; sc = '#604028'; isG = false; }
    else if(fr.s === '석유 가스'){ st = '기체 상태'; sc = '#e04020'; isG = true; }
    else if(tA > ab){ st = `기체 상태 (${tA}℃ > 끓는점)`; sc = '#e04020'; isG = true; }
    else{ st = `액체 상태 (${tA}℃ < 끓는점)`; sc = '#2070d0'; isG = false; }
    const t = Date.now();
    
    X.save();
    
    X.font = "800 13px Pretendard";
    const tw1 = X.measureText(st).width + 30;
    X.font = "700 12px 'IBM Plex Mono'";
    const tw2 = X.measureText(`🌡️ 탑 내부: ~${tA}℃`).width + 30;
    const boxW = Math.max(tw1, tw2, 160);
    const boxH = 50;
    const boxX = cx - boxW / 2;
    const boxY = cy - 95; 

    X.shadowColor = 'rgba(0,0,0,0.3)'; X.shadowBlur = 10; X.shadowOffsetY = 4;
    X.fillStyle = dk ? 'rgba(20, 26, 36, 0.95)' : 'rgba(255, 255, 255, 0.95)';
    rr(X, boxX, boxY, boxW, boxH, 8); X.fill();
    X.shadowBlur = 0; X.shadowOffsetY = 0; X.shadowColor = 'transparent';
    
    X.save();
    rr(X, boxX, boxY, boxW, boxH, 8); X.clip();
    X.fillStyle = isG ? 'rgba(224, 64, 32, 0.08)' : 'rgba(32, 112, 208, 0.08)';
    X.fillRect(boxX, boxY, boxW, 25);
    X.strokeStyle = dk ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    X.lineWidth = 1;
    X.beginPath(); X.moveTo(boxX, boxY + 25); X.lineTo(boxX + boxW, boxY + 25); X.stroke();
    X.restore();

    X.strokeStyle = sc; X.lineWidth = 2;
    rr(X, boxX, boxY, boxW, boxH, 8); X.stroke();
    
    X.textAlign = 'center'; X.textBaseline = 'middle';
    
    X.font = "700 12px 'IBM Plex Mono'";
    X.fillStyle = dk ? '#ffcc33' : '#d09010';
    X.fillText(`🌡️ 탑 내부: ~${tA}℃`, cx, boxY + 13);

    X.font = "800 13px Pretendard";
    X.fillStyle = sc;
    X.fillText(st, cx, boxY + 38);
    
    X.textBaseline = 'alphabetic';
    
    if (isG) {
        const yOff = (t / 50) % 15;
        X.font = "20px Arial";
        X.fillText("☁️", cx - 35, boxY - 10 - yOff);
        X.fillText("🫧", cx + 25, boxY - 20 - (t/40)%20);
    } else {
        const yOff = (t / 40) % 15;
        X.font = "16px Arial";
        X.fillText("💧", cx - 25, boxY + boxH + 8 + yOff);
        X.fillText("💧", cx + 25, boxY + boxH + 13 + (t/30)%15);
    }
    
    X.restore();
  }
  
  X.shadowColor = 'rgba(0,0,0,.3)'; X.shadowBlur = 10; X.shadowOffsetX = 0; X.shadowOffsetY = 5;
  X.fillStyle = fr.col; rr(X, cx-40, cy-15, 80, 30, 8); X.fill(); 
  X.shadowBlur = 0; X.shadowOffsetX = 0; X.shadowOffsetY = 0; X.shadowColor = 'transparent';
  X.fillStyle = 'rgba(255,255,255,.1)'; X.fillRect(cx-39, cy-14, 78, 14);
  X.strokeStyle = 'rgba(255,255,255,.15)'; X.lineWidth = 1; rr(X, cx-40, cy-15, 80, 30, 8); X.stroke();
  X.fillStyle = '#fff'; X.font = "800 14px Pretendard"; X.textAlign = 'center'; X.fillText(fr.s, cx, cy+5);
}

let mcb = null;
function showD(m, cb = null){
  document.getElementById('mg').innerText = m;
  const ov = document.getElementById('ov');
  ov.style.display = 'flex';
  setTimeout(() => ov.classList.add('show'), 10);
  mcb = cb;
}
window.clD = function(){
  const ov = document.getElementById('ov');
  ov.classList.remove('show');
  setTimeout(() => { ov.style.display = 'none'; if(mcb){ mcb(); mcb = null; } }, 300);
}
function tFS(){ const e = document.documentElement; if(!document.fullscreenElement)(e.requestFullscreen||e.webkitRequestFullscreen||e.msRequestFullscreen).call(e); else(document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen).call(document); }
window.onload = init;
</script>
